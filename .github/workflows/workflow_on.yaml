run-name: workflow_run
name: workflow_run

on:
    workflow_run: 
        workflows: [first_wf]
        types: 
            - completed

jobs:
  workflow_on:
    runs-on: ubuntu-latest
    if: ${{github.event.workflow_run.conclusion == 'success'}}
    steps:
      - name: schedule_wf
        run: python --version
      - name: node_version
        run: node -v
  workflow_off:
    runs-on: ubuntu-latest
    steps:
      - name: python_version
        run: python --version